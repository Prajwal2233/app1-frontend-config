apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app1-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/prajwal2233/app1-frontend-config.git
    targetRevision: main
    path: frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: app1-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
